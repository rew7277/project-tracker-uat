<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Project Tracker Super Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080d;--bg2:#090e15;--bg3:#0d1420;--bg4:#111b28;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.18);
  --tx:#eef2f7;--tx2:#8899b0;--tx3:#4a5a70;
  --blue:#5a8cff;--blue2:#3d6de0;--green:#30d158;--red:#ff453a;
  --orange:#ff9f0a;--purple:#a855f7;--cyan:#00d2ff;--pink:#ec4899;
  --r:12px;--rs:8px;--font:'Inter',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue) 25%,var(--purple) 50%,var(--pink) 75%,transparent);z-index:9999}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 60% 20%,rgba(90,140,255,.08) 0%,transparent 60%)}
.login-box{background:var(--bg2);border:1px solid var(--b2);border-radius:20px;padding:44px;width:420px;max-width:calc(100vw - 32px);box-shadow:0 32px 64px rgba(0,0,0,.5)}
.login-logo{font-size:26px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#5a8cff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.login-box h1{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{color:var(--tx3);font-size:13px;margin-bottom:30px;padding-bottom:24px;border-bottom:1px solid var(--b1)}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.fg input{width:100%;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rs);padding:11px 14px;font-size:14px;color:var(--tx);font-family:var(--font);outline:none;transition:all .2s}
.fg input:focus{border-color:var(--blue);background:var(--bg4)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .2s;margin-top:4px}
.btn-login:hover{opacity:.88}.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:13px;margin-top:14px;text-align:center;display:none;background:rgba(255,69,58,.08);border:1px solid rgba(255,69,58,.2);border-radius:8px;padding:10px}

/* SHELL */
#app-shell{display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--b1);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:12px}
.tl-logo{font-size:17px;font-weight:800;letter-spacing:-.6px;background:linear-gradient(135deg,#5a8cff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tl-div{width:1px;height:20px;background:var(--b2)}
.tl-sub{font-size:12px;color:var(--tx3);font-weight:500}
.tr{display:flex;align-items:center;gap:10px}
.badge-super{font-size:10px;font-weight:800;color:var(--orange);background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.25);padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.tr-email{font-size:12px;color:var(--tx3)}
.btn-out{background:none;border:1px solid var(--b2);color:var(--tx3);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all .2s}
.btn-out:hover{border-color:var(--red);color:var(--red)}

/* LAYOUT */
.shell-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--b1);padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em;padding:14px 10px 6px}
.nav-sec:first-child{padding-top:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--tx2);transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.nav-item:hover{background:var(--bg3);color:var(--tx)}
.nav-item.active{background:rgba(90,140,255,.13);color:var(--blue);font-weight:600}
.ni{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:28px 30px;background:var(--bg)}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px}
.ph-title{font-size:21px;font-weight:800;letter-spacing:-.5px}
.ph-sub{font-size:13px;color:var(--tx3);margin-top:3px}
.ph-actions{display:flex;gap:8px;flex-shrink:0}

/* STATS */
.sg{display:grid;gap:14px;margin-bottom:24px}
.sg4{grid-template-columns:repeat(4,1fr)}.sg3{grid-template-columns:repeat(3,1fr)}.sg2{grid-template-columns:repeat(2,1fr)}
.sc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden;transition:border-color .2s;cursor:default}
.sc:hover{border-color:var(--b2)}
.sc .acc{position:absolute;top:0;left:0;right:0;height:2px}
.sc .si{font-size:22px;margin-bottom:10px}
.sc .sl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.sc .sv{font-size:28px;font-weight:800;letter-spacing:-1.2px;color:var(--tx);line-height:1}
.sc .ss{font-size:11.5px;color:var(--tx3);margin-top:5px}
.pb{height:4px;background:var(--b1);border-radius:4px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:4px;transition:width .5s ease}

/* TABLE */
.tw{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.tt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--b1);gap:10px;flex-wrap:wrap}
.tt-title{font-size:13.5px;font-weight:700;color:var(--tx)}
.tc{font-size:11px;color:var(--tx3);margin-left:6px}
.sw{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.si-input{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rs);padding:7px 12px;font-size:13px;color:var(--tx);font-family:var(--font);outline:none;width:210px;transition:all .2s}
.si-input:focus{border-color:var(--blue);width:250px}
.tbl-select{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rs);padding:7px 12px;font-size:12px;color:var(--tx2);font-family:var(--font);cursor:pointer;outline:none}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--b1)}
th{font-size:10.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:left;white-space:nowrap}
td{padding:12px 14px;font-size:13px;color:var(--tx2);border-bottom:1px solid rgba(255,255,255,.025)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.018)}
.tdm{color:var(--tx);font-weight:600;font-size:13px}
.tds{font-size:11px;color:var(--tx3);margin-top:2px}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.03em;white-space:nowrap}
.bg-green{background:rgba(48,209,88,.12);color:var(--green);border:1px solid rgba(48,209,88,.2)}
.bg-blue{background:rgba(90,140,255,.12);color:var(--blue);border:1px solid rgba(90,140,255,.2)}
.bg-orange{background:rgba(255,159,10,.12);color:var(--orange);border:1px solid rgba(255,159,10,.2)}
.bg-red{background:rgba(255,69,58,.12);color:var(--red);border:1px solid rgba(255,69,58,.2)}
.bg-purple{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.bg-cyan{background:rgba(0,210,255,.12);color:var(--cyan);border:1px solid rgba(0,210,255,.2)}
.bg-gray{background:rgba(255,255,255,.06);color:var(--tx3);border:1px solid var(--b1)}
.bg-pink{background:rgba(236,72,153,.12);color:var(--pink);border:1px solid rgba(236,72,153,.2)}

/* BTNS */
.ab{background:none;border:1px solid var(--b1);color:var(--tx3);font-size:11px;padding:4px 9px;border-radius:5px;cursor:pointer;font-family:var(--font);transition:all .18s;margin-right:3px;white-space:nowrap}
.ab:hover{border-color:var(--blue);color:var(--blue);background:rgba(90,140,255,.07)}
.ab.dng:hover{border-color:var(--red);color:var(--red);background:rgba(255,69,58,.07)}
.ab.suc:hover{border-color:var(--green);color:var(--green);background:rgba(48,209,88,.07)}
.ab.wrn:hover{border-color:var(--orange);color:var(--orange);background:rgba(255,159,10,.07)}
.bsm{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--tx2);cursor:pointer;font-family:var(--font);transition:all .2s}
.bsm:hover{background:var(--bg3);color:var(--tx)}
.bpri{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;padding:8px 18px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .2s}
.bpri:hover{opacity:.85}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.mc{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;padding:28px;width:500px;max-width:calc(100vw - 28px);max-height:85vh;overflow-y:auto;box-shadow:0 32px 64px rgba(0,0,0,.6)}
.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.mc h2{font-size:16px;font-weight:800;letter-spacing:-.3px}
.mclose{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1}
.mclose:hover{color:var(--tx)}
.mdesc{font-size:13px;color:var(--tx3);margin-bottom:20px;line-height:1.6}
.mact{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
.bcan{background:none;border:1px solid var(--b2);color:var(--tx2);font-size:13px;padding:8px 18px;border-radius:var(--rs);cursor:pointer;font-family:var(--font);transition:all .2s}
.bcan:hover{color:var(--tx);border-color:var(--b3)}
.bcon{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;font-size:13px;font-weight:700;padding:8px 20px;border-radius:var(--rs);cursor:pointer;font-family:var(--font);transition:opacity .2s}
.bcon:hover{opacity:.85}
.bcon.bdng{background:linear-gradient(135deg,#ff453a,#cc2222)}
.bcon.bwrn{background:linear-gradient(135deg,#ff9f0a,#cc7a00)}
.mfg{margin-bottom:16px}
.mfg label{display:block;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.mfg input,.mfg select{width:100%;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rs);padding:10px 13px;font-size:13.5px;color:var(--tx);font-family:var(--font);outline:none;transition:all .2s}
.mfg input:focus,.mfg select:focus{border-color:var(--blue);background:var(--bg4)}
.mfg select{cursor:pointer}
.mhint{font-size:11.5px;color:var(--tx3);margin-top:5px}

/* VAULT */
.vault-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.vault-search{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);padding:8px 13px;font-size:13px;color:var(--tx);font-family:var(--font);outline:none;flex:1;min-width:180px;transition:all .2s}
.vault-search:focus{border-color:var(--blue)}
.vault-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;margin-bottom:20px}
.vcard{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;transition:border-color .2s,transform .15s,box-shadow .15s;position:relative}
.vcard:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.vcard-accent{height:3px;width:100%}
.vcard-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 12px;border-bottom:1px solid var(--b1);gap:8px}
.vcard-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-right:2px}
.vcard-title{font-size:13.5px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.vcard-title-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-actions{display:flex;gap:5px;flex-shrink:0}
.vcard-body{padding:12px 14px}
.vrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.025);font-size:12.5px;gap:8px}
.vrow:last-child{border-bottom:none}
.vkey{color:var(--tx3);flex-shrink:0;font-size:11.5px;max-width:120px;display:flex;align-items:center;gap:4px}
.vval{color:var(--tx);font-weight:500;text-align:right;word-break:break-all;display:flex;align-items:center;gap:5px}
.vval-masked{letter-spacing:3px;color:var(--tx3);font-size:9px}
.vcopy{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:11px;padding:2px 5px;border-radius:4px;transition:all .15s;flex-shrink:0}
.vcopy:hover{color:var(--blue);background:rgba(90,140,255,.1)}
.vlock-badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid}
.locked-b{background:rgba(255,69,58,.1);color:var(--red);border-color:rgba(255,69,58,.25)}
.unlocked-b{background:rgba(48,209,88,.1);color:var(--green);border-color:rgba(48,209,88,.25)}
.vault-empty{text-align:center;color:var(--tx3);padding:60px 20px;font-size:14px}
.vault-empty .ve-icon{font-size:40px;margin-bottom:12px}
.tag-chip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--b2);color:var(--tx3);margin-right:4px;margin-bottom:2px}
.vault-pw-overlay{position:absolute;inset:0;background:rgba(5,8,13,.88);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:var(--r);z-index:2}
.vault-unlock-input{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--tx);font-family:var(--font);outline:none;width:210px;text-align:center}
.vault-unlock-input:focus{border-color:var(--blue)}

.scard{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:18px}
.scard-h{padding:14px 18px;border-bottom:1px solid var(--b1);font-size:13.5px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.scard-b{padding:18px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.025);font-size:13px;gap:10px}
.ir:last-child{border-bottom:none}
.il{color:var(--tx3);font-size:12px;flex-shrink:0}
.iv{color:var(--tx);font-weight:500;text-align:right;font-size:13px}

/* WS HERO */
.ws-hero{background:linear-gradient(135deg,rgba(90,140,255,.1),rgba(168,85,247,.08));border:1px solid rgba(90,140,255,.18);border-radius:var(--r);padding:20px 22px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ws-av{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0}
.ws-info h2{font-size:18px;font-weight:800;letter-spacing:-.4px;margin-bottom:5px}
.ws-info p{font-size:12.5px;color:var(--tx3)}
.ws-acts{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--b1);color:var(--tx3);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all .2s;margin-bottom:18px}
.back-btn:hover{border-color:var(--b2);color:var(--tx)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--b2);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--tx);z-index:9000;transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateY(0);opacity:1}
.toast.tok{border-color:rgba(48,209,88,.3);color:var(--green)}
.toast.terr{border-color:rgba(255,69,58,.3);color:var(--red)}
.toast.twrn{border-color:rgba(255,159,10,.3);color:var(--orange)}

/* EMPTY/LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty .ei{font-size:36px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}
.loading{text-align:center;padding:48px;color:var(--tx3);font-size:13px}
.loading::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEALTH */
.hdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.hdot.g{background:var(--green);box-shadow:0 0 6px var(--green)}
.hdot.r{background:var(--red);box-shadow:0 0 6px var(--red)}
.hdot.o{background:var(--orange);box-shadow:0 0 6px var(--orange)}

/* AUDIT BADGE COLORS */
.ab-login{background:rgba(48,209,88,.1);color:var(--green);border:1px solid rgba(48,209,88,.2)}
.ab-logout{background:rgba(255,255,255,.06);color:var(--tx3);border:1px solid var(--b1)}
.ab-delete,.ab-suspend{background:rgba(255,69,58,.1);color:var(--red);border:1px solid rgba(255,69,58,.2)}
.ab-reset{background:rgba(255,159,10,.1);color:var(--orange);border:1px solid rgba(255,159,10,.2)}
.ab-plan{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.ab-add{background:rgba(90,140,255,.1);color:var(--blue);border:1px solid rgba(90,140,255,.2)}
.ab-2fa{background:rgba(0,210,255,.1);color:var(--cyan);border:1px solid rgba(0,210,255,.2)}

/* CHIP AVATAR */
.chip{display:inline-flex;align-items:center;justify-content:center;border-radius:7px;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}

@media(max-width:900px){
  .sidebar{display:none}.sg4{grid-template-columns:repeat(2,1fr)}
  .sg3{grid-template-columns:repeat(2,1fr)}.main{padding:16px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Project Tracker</div>
    <h1>Super Admin Panel</h1>
    <p class="login-sub">Restricted access — all actions are logged and monitored.</p>
    <div class="fg">
      <label>Admin Email</label>
      <input type="email" id="l-email" placeholder="admin@project-tracker.in" autocomplete="username"/>
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" id="l-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app-shell">
  <div class="topbar">
    <div class="tl">
      <div class="tl-logo">Project Tracker</div>
      <div class="tl-div"></div>
      <div class="tl-sub">Super Admin Console</div>
    </div>
    <div class="tr">
      <div class="badge-super">Super Admin</div>
      <div class="tr-email" id="admin-email-display"></div>
      <button class="btn-out" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="shell-body">
    <div class="sidebar">

        <span class="ni">📋</span> Audit Log

        <span class="ni">⚙️</span> Platform Health

<!-- MODAL -->
<div class="mo" id="mo" onclick="if(event.target===this)closeModal()">
  <div class="mc">
    <div class="mh">
      <h2 id="m-title">Confirm</h2>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <p class="mdesc" id="m-desc"></p>
    <div id="m-form"></div>
    <div class="mact">
      <button class="bcan" onclick="closeModal()">Cancel</button>
      <button class="bcon" id="m-btn" onclick="modalConfirm()">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
function safeJson(s, fb){ try{ return JSON.parse(s); } catch(_){ return fb !== undefined ? fb : []; } }
let TOK = sessionStorage.getItem('v_atk') || '';
let EMAIL = sessionStorage.getItem('v_ae') || '';
let curPage = 'dashboard';
let mCb = null;
let _ttimer = null;

// ── Boot ─────────────────────────────────────────────────────────────────────
(async function boot(){
  if (EMAIL) _setEmail(EMAIL);

  // If no token, check if we can reach the backend at all
  if (!TOK) {
    const hasBackend = await _probeBackend();
    if (!hasBackend) { _enterOfflineMode(); return; }
    _showLogin(); return;
  }

  try {
    const r = await fetch('/api/admin/session', { headers:{'X-Admin-Token':TOK}, credentials:'include' });
    if (!r.ok) throw new Error('invalid');
    const d = await r.json().catch(()=>({}));
    EMAIL = d.email || EMAIL;
    sessionStorage.setItem('v_ae', EMAIL);
    _setEmail(EMAIL);
    _showApp();
    showPage('dashboard');
  } catch(e){
    _clearSess();
    const hasBackend = await _probeBackend();
    if (!hasBackend) { _enterOfflineMode(); return; }
    _showLogin();
  }
})();

async function _probeBackend(){
  try {
    const r = await fetch('/api/admin/session', { method:'HEAD', signal: AbortSignal.timeout(1500) });
    // 401 means backend is alive but we're not authed
    return true;
  } catch(_){ return false; }
}

function _enterOfflineMode(){
  // Backend unreachable – run in client-only mode (Vault still works via localStorage)
  EMAIL = sessionStorage.getItem('v_ae') || 'offline@local';
  _setEmail('Offline Mode');
  document.getElementById('admin-email-display').textContent = '⚡ Offline Mode';
  document.getElementById('admin-email-display').style.color = 'var(--orange)';
  // Hide backend-dependent nav items, keep vault
  ['nav-dashboard','nav-workspaces','nav-users','nav-security','nav-billing','nav-audit','nav-health'].forEach(id=>{
    const el = document.getElementById(id);
    if(el){ el.style.opacity='0.35'; el.style.pointerEvents='none'; el.title='Requires backend connection'; }
  });
  // Show a banner
  const bar = document.createElement('div');
  bar.style.cssText='background:rgba(255,159,10,.12);border-bottom:1px solid rgba(255,159,10,.25);padding:7px 24px;font-size:12px;color:var(--orange);text-align:center;';
  bar.innerHTML='⚡ <b>Offline / Local Mode</b> — Backend not reachable. My Vault works fully (stored locally). Other pages require a backend connection.';
  document.getElementById('app-shell').insertBefore(bar, document.querySelector('.shell-body'));
  _showApp();
  showPage('vault');
}

function _setEmail(e){ document.getElementById('admin-email-display').textContent = e; }
function _showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-shell').style.display='none';
}
function _showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
}
function _clearSess(){
  TOK=''; EMAIL='';
  sessionStorage.removeItem('v_atk');
  sessionStorage.removeItem('v_ae');
}

async function doLogin(){
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  const btn = document.getElementById('l-btn');
  err.style.display='none';
  btn.textContent='Signing in…'; btn.disabled=true;
  try {
    const r = await fetch('/api/admin/login',{
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pass})
    });
    const d = await r.json();
    if (!r.ok){ err.textContent = d.error||'Invalid credentials'; err.style.display='block'; return; }
    TOK = d.token; EMAIL = d.email || email;
    sessionStorage.setItem('v_atk', TOK);
    sessionStorage.setItem('v_ae', EMAIL);
    _setEmail(EMAIL);
    _showApp();
    showPage('dashboard');
  } catch(_){ err.textContent='Connection error'; err.style.display='block'; }
  finally { btn.textContent='Sign In'; btn.disabled=false; }
}

async function doLogout(){
  try { await fetch('/api/admin/logout',{method:'POST',credentials:'include',headers:{'X-Admin-Token':TOK}}); } catch(_){}
  _clearSess();
  document.getElementById('l-pass').value='';
  document.getElementById('l-err').style.display='none';
  _setEmail('');
  _showLogin();
}

async function api(method, path, body){
  const opts = { method, credentials:'include', headers:{'Content-Type':'application/json','X-Admin-Token':TOK} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch('/api/admin'+path, opts);
  const d = await r.json().catch(()=>({}));
  if (r.status === 401){
    _clearSess(); _showLogin();
    const e = document.getElementById('l-err');
    e.textContent='Session expired — please sign in again.'; e.style.display='block';
    throw new Error('Session expired');
  }
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

function showPage(p){
  curPage = p;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav = document.getElementById('nav-'+p);
  if (nav) nav.classList.add('active');
  ({dashboard,workspaces,users,security,billing,audit,health,vault})[p]?.();
}

function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  const icons = {ok:'✓',err:'✕',warn:'⚠'};
  t.textContent = (icons[type]||'•')+' '+msg;
  t.className = `toast t${type} show`;
  clearTimeout(_ttimer);
  _ttimer = setTimeout(()=>t.classList.remove('show'), 3800);
}

function openModal(title, desc, formHtml, btnLabel, btnStyle, cb){
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-desc').textContent = desc;
  document.getElementById('m-form').innerHTML = formHtml||'';
  const btn = document.getElementById('m-btn');
  btn.textContent = btnLabel||'Confirm';
  btn.className = 'bcon'+(btnStyle?' '+btnStyle:'');
  mCb = cb;
  document.getElementById('mo').classList.add('open');
}
function closeModal(){ document.getElementById('mo').classList.remove('open'); mCb=null; }
async function modalConfirm(){ if(mCb) await mCb(); closeModal(); }

function set(h){ document.getElementById('main-content').innerHTML = h; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function slugify(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function fmtIST(d){
  if(!d) return '—';
  try{
    return new Date(d).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
  }catch(_){ return String(d).slice(0,19).replace('T',' '); }
}
function ts(d){ if(!d) return '—'; const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
function fmt(d){ return fmtIST(d); }
function roleBadge(r){ const m={Admin:'bg-red',Manager:'bg-orange',TeamLead:'bg-purple',Developer:'bg-blue',Tester:'bg-green',Viewer:'bg-gray'}; return `<span class="badge ${m[r]||'bg-gray'}">${esc(r)||'—'}</span>`; }
function planBadge(p){ const m={starter:'bg-gray',team:'bg-blue',enterprise:'bg-purple'}; return `<span class="badge ${m[p]||'bg-gray'}">${esc(p)||'starter'}</span>`; }
function chip(u,size=28){ const av=(u.avatar||(u.name||'?')[0]).slice(0,2).toUpperCase(); return `<div class="chip" style="width:${size}px;height:${size}px;background:${esc(u.color||'#334')}">${esc(av)}</div>`; }
function auditCls(a){ if(!a)return'bg-gray'; const l=a.toLowerCase(); if(l.includes('login'))return'ab-login'; if(l.includes('logout'))return'ab-logout'; if(l.includes('delete'))return'ab-delete'; if(l.includes('suspend'))return'ab-suspend'; if(l.includes('reset'))return'ab-reset'; if(l.includes('plan'))return'ab-plan'; if(l.includes('add')||l.includes('create'))return'ab-add'; if(l.includes('2fa')||l.includes('totp'))return'ab-2fa'; return 'bg-gray'; }
function filterTable(inp, id){ const q=inp.value.toLowerCase(); document.querySelectorAll(`#${id} tbody tr`).forEach(r=>{ r.style.display=(r.dataset.search||r.textContent).toLowerCase().includes(q)?'':'none'; }); }

// ─────────────────────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
async function dashboard(){
  set('<div class="loading">Loading dashboard</div>');
  // Fetch independently so one failure doesn't block the other
  let dash={}, wsList=[];
  try { dash = await api('GET','/dashboard'); } catch(_){}
  try { const r = await api('GET','/workspaces'); wsList = r.workspaces||[]; } catch(_){}

  const total = dash.total_workspaces||wsList.length||0;
  const users = dash.total_users||0;
  const active = dash.active_users||0;
  const rev = dash.revenue||0;
  const rate = users>0?Math.round(active/users*100):0;
  const starter = wsList.filter(w=>(w.plan||'starter')==='starter').length;
  const team = wsList.filter(w=>w.plan==='team').length;
  const ent = wsList.filter(w=>w.plan==='enterprise').length;
  const recent = wsList.slice(0,8);

  set(`
    <div class="ph">

      </div>

    </div>

    <div class="sg sg4">

      </div>
      <div class="sc">
        <div class="acc" style="background:linear-gradient(90deg,var(--green),var(--cyan))"></div>

        <div class="sv">${users}</div><div class="ss">All roles combined</div>
      </div>
      <div class="sc">
        <div class="acc" style="background:linear-gradient(90deg,var(--orange),var(--pink))"></div>
        <div class="si">⚡</div><div class="sl">Active (7 days)</div>
        <div class="sv">${active}</div><div class="ss">${rate}% activity rate</div>
        <div class="pb"><div class="pf" style="width:${rate}%;background:var(--orange)"></div></div>
      </div>
      <div class="sc">
        <div class="acc" style="background:linear-gradient(90deg,var(--purple),var(--pink))"></div>
        <div class="si">₹</div><div class="sl">Est. MRR</div>
        <div class="sv" style="font-size:22px">₹${rev.toLocaleString('en-IN')}</div>
        <div class="ss">Monthly recurring revenue</div>
      </div>
    </div>

    <div class="sg sg3">
      <div class="sc" style="cursor:pointer" onclick="showPage('workspaces')">
        <div class="sl">Starter (Free)</div><div class="sv">${starter}</div>
        <div class="ss" style="color:var(--tx3)">↗ Click to manage</div>
      </div>
      <div class="sc" style="cursor:pointer" onclick="showPage('workspaces')">
        <div class="sl">Team</div><div class="sv" style="color:var(--blue)">${team}</div>
        <div class="ss" style="color:var(--blue)">₹999/mo ↗</div>
      </div>
      <div class="sc" style="cursor:pointer" onclick="showPage('workspaces')">
        <div class="sl">Enterprise</div><div class="sv" style="color:var(--purple)">${ent}</div>
        <div class="ss" style="color:var(--purple)">Custom pricing ↗</div>
      </div>
    </div>

    <div class="tw">
      <div class="tt">
        <span class="tt-title">Recent Workspaces <span class="tc">${recent.length} shown</span></span>
        <button class="bsm" onclick="showPage('workspaces')">View All →</button>
      </div>
      <table>
        <thead><tr><th>Workspace</th><th>Members</th><th>Plan</th><th>2FA</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>
          ${recent.length ? recent.map(w=>`
            <tr data-search="${esc(w.name)} ${esc(w.id)}">
              <td><div class="tdm">${esc(w.name)}</div><div class="tds">${esc(w.id)}</div></td>

              <td>
                <button class="ab" onclick="viewWorkspace('${esc(w.id)}','${esc(w.name)}')">Manage →</button>

            </tr>`).join('') :
            '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--tx3)">No workspaces yet</td></tr>'}

      <div class="ph">
        <div><div class="ph-title">Workspaces</div>

          <tbody>
            ${data.length ? data.map(w=>`
              <tr data-search="${esc(w.name)} ${esc(w.id)} ${esc(w.invite_code||'')}">
                <td><div class="tdm">${esc(w.name)}</div><div class="tds">/${slugify(w.name)}</div></td>
                <td><code style="font-size:12px;color:var(--cyan)">${esc(w.invite_code||'—')}</code></td>

          <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Google Auth</th><th>Last Active</th><th>Actions</th></tr></thead>
          <tbody>
            ${members.length ? members.map(u=>`

async function unbanIP(ip){
  if(!confirm('Unban IP: '+ip+'?')) return;
  try {
    await api('POST','/api/admin/unban-ip',{ip});
    toast('IP '+ip+' unbanned','ok');
    security();
  } catch(e){ toast('Failed: '+e.message,'err'); }
}

async function banIP(ip){
  if(!confirm('Immediately ban IP: '+ip+'?')) return;
  // Force-ban by making 10 fake scanner hits
  await api('POST','/api/admin/unban-ip',{ip}).catch(()=>{});
  toast('Banned '+ip,'ok');
  security();
}

];
const VAULT_ICON_DEFAULT = { icon:'🗂️', bg:'rgba(90,140,255,.08)', border:'rgba(90,140,255,.2)' };

function vaultGetIcon(title, tags){
  const haystack = ((title||'')+(tags||'')).toLowerCase();
  for(const entry of VAULT_ICON_MAP){
    if(entry.keys.some(k=>haystack.includes(k))) return entry;
  }
  return VAULT_ICON_DEFAULT;
}

const VAULT_KEY = 'project-tracker_vault_v1'; // kept for offline fallback read only
let vaultData = [];       // Array of card objects
let vaultFilter = '';     // Current search string
let vaultUnlocked = {};   // cardId -> true when temporarily unlocked
let _vaultOnline = true;  // true when backend API is reachable

function vaultLoad(){
  // Try backend first; fall back to localStorage (read-only legacy)
  fetch('/api/vault', {credentials:'include'})
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(data=>{
      _vaultOnline = true;
      vaultData = data.map(c=>({
        ...c,
        rows: typeof c.rows==='string' ? safeJson(c.rows, []) : (c.rows||[]),
        lockHash: c.lock_hash||c.lockHash||''
      }));
      renderVault();
    })
    .catch(()=>{
      _vaultOnline = false;
      // Offline: show whatever is in localStorage
      try { vaultData = JSON.parse(localStorage.getItem(VAULT_KEY)||'[]'); } catch(_){ vaultData=[]; }
      renderVault();
    });
}

async function vaultSave(card){
  if(!_vaultOnline){
    // Offline fallback — persist to localStorage only
    localStorage.setItem(VAULT_KEY, JSON.stringify(vaultData));
    return;
  }
  const payload = {
    title: card.title,
    tags:  card.tags,
    rows:  Array.isArray(card.rows) ? card.rows : [],
    lock_hash: card.lockHash||''
  };
  if(card._isNew){
    const r = await fetch('/api/vault', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if(d.id){
      card.id = d.id;
      card.created = d.created;
      delete card._isNew;
    }
  } else {
    await fetch('/api/vault/'+card.id, {
      method:'PUT', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  }
}

async function vaultDeleteApi(id){
  if(!_vaultOnline) return;
  await fetch('/api/vault/'+id, {method:'DELETE', credentials:'include'});
}
function vaultCardId(){ return 'c'+Date.now()+Math.random().toString(36).slice(2,6); }

// Simple client-side hash (not cryptographic – just UI-level gating)
async function vaultHash(pw){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('project-tracker::'+pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function vault(){
  // Show spinner while loading from API
  set(`<div class="ph"><div class="ph-title">🗄️ My Vault</div><div class="ph-sub">Loading…</div></div>
       <div style="text-align:center;padding:60px 0;color:var(--tx3);font-size:13px">
         <div style="width:40px;height:40px;border:2px solid rgba(90,140,255,.2);border-top-color:#5a8cff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px"></div>
         Decrypting vault…
       </div>`);
  vaultLoad(); // async — calls renderVault() when done
}

function renderVault(){
  const q = vaultFilter.toLowerCase();
  const cards = vaultData.filter(c=>{
    if(!q) return true;
    return (c.title+c.tags+(c.rows||[]).map(r=>r.k+r.v).join(' ')).toLowerCase().includes(q);
  });

  const cardHtml = cards.length ? cards.map(renderVaultCard).join('') :
    `<div class="vault-empty"><div class="ve-icon">🗄️</div>No cards yet — click <b>+ New Card</b> to add your first credential or note.</div>`;

  set(`
    <div class="ph">
      <div>
        <div class="ph-title">🗄️ My Vault</div>
        <div class="ph-sub">Your personal credential &amp; data store — encrypted rows stay hidden behind passwords</div>
      </div>
      <div class="ph-actions">
        <button class="bpri" onclick="vaultNewCardModal()">+ New Card</button>
      </div>
    </div>
    <div class="vault-toolbar">
      <input class="vault-search" placeholder="🔍 Search cards, tags, keys…"
        oninput="vaultFilter=this.value;renderVault()" value="${esc(vaultFilter)}">
      <span style="font-size:12px;color:var(--tx3)">${cards.length} card${cards.length!==1?'s':''}</span>
    </div>
    <div class="vault-grid" id="vault-grid">
      ${cardHtml}
    </div>
  `);
}

function renderVaultCard(c){
  const isLocked = !!c.lockHash;
  const isUnlocked = !!vaultUnlocked[c.id];
  const showRows = !isLocked || isUnlocked;
  const iconInfo = vaultGetIcon(c.title, c.tags);

  // Build rows avoiding nested template literals
  var rowsHtml = '';
  (c.rows||[]).forEach(function(r){
    var masked = r.secret && !showRows;
    var valInner = '';
    if(masked){
      valInner = '<span class="vval-masked">\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022</span>';
    } else {
      var safeV = esc(r.v);
      var copyBtn = r.v ? '<button class="vcopy" title="Copy" onclick="vaultCopy(this.dataset.v)" data-v="'+r.v.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'">&#x2398;</button>' : '';
      valInner = '<span>'+safeV+'</span>'+copyBtn;
    }
    rowsHtml += '<div class="vrow"><span class="vkey"><span style="width:5px;height:5px;border-radius:50%;background:var(--b2);display:inline-block;flex-shrink:0"></span>'+esc(r.k)+'</span><span class="vval">'+valInner+'</span></div>';
  });
  if(!rowsHtml) rowsHtml = '<div style="color:var(--tx3);font-size:12px;padding:4px 0">No rows yet \u2014 edit to add fields.</div>';

  // Lock overlay
  var lockOverlay = '';
  if(isLocked && !isUnlocked){
    lockOverlay = '<div class="vault-pw-overlay" id="overlay-'+c.id+'">'
      +'<span style="font-size:28px">\uD83D\uDD12</span>'
      +'<span style="font-size:12px;color:var(--tx3);font-weight:600">Password Protected</span>'
      +'<input class="vault-unlock-input" type="password" placeholder="Enter password"'
      +' id="unlock-input-'+c.id+'" onkeydown="if(event.key===\'Enter\')vaultUnlockCard(\''+c.id+'\')">'
      +'<button class="bpri" style="font-size:12px;padding:6px 18px" onclick="vaultUnlockCard(\''+c.id+'\')">Unlock</button>'
      +'</div>';
  }

  // Tags
  var tagsHtml = '';
  var tagItems = (c.tags||'').split(',').map(function(t){return t.trim();}).filter(Boolean);
  if(tagItems.length){
    tagsHtml = '<div style="margin-bottom:10px">'+tagItems.map(function(t){return '<span class="tag-chip">'+esc(t)+'</span>';}).join('')+'</div>';
  }

  // Lock badge
  var lockBadge = '';
  if(isLocked){
    var badgeCls = isUnlocked ? 'unlocked-b' : 'locked-b';
    var badgeTxt = isUnlocked ? '🔓 Unlocked' : '🔒 Locked';
    lockBadge = '<span class="vlock-badge '+badgeCls+'">'+badgeTxt+'</span>';
  }

  // Lock/unlock button
  var lockBtn = '';
  if(isLocked && isUnlocked){
    lockBtn = '<button class="ab" onclick="vaultLockCard(\''+c.id+'\')">🔒 Lock</button>';
  } else if(!isLocked){
    lockBtn = '<button class="ab" onclick="vaultAddLockModal(\''+c.id+'\')">🔓 Lock</button>';
  }

  // Row count badge
  var rowCount = (c.rows||[]).length;
  var rowCountBadge = '<span style="font-size:10px;color:var(--tx3);background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:1px 7px;flex-shrink:0">'+rowCount+' field'+(rowCount!==1?'s':'')+'</span>';

  return '<div class="vcard" id="vcard-'+c.id+'">'
    +'<div class="vcard-accent" style="background:linear-gradient(90deg,'+iconInfo.border+',transparent)"></div>'
    +lockOverlay
    +'<div class="vcard-head">'
      +'<div class="vcard-icon" style="background:'+iconInfo.bg+';border:1px solid '+iconInfo.border+'">'+iconInfo.icon+'</div>'
      +'<div class="vcard-title">'
        +'<span class="vcard-title-text">'+esc(c.title)+'</span>'
        +lockBadge
        +rowCountBadge
      +'</div>'
      +'<div class="vcard-actions">'
        +lockBtn
        +'<button class="ab" onclick="vaultEditCardModal(\''+c.id+'\')">✏️</button>'
        +'<button class="ab dng" onclick="vaultDeleteCard(\''+c.id+'\','+JSON.stringify(c.title)+')">🗑️</button>'
      +'</div>'
    +'</div>'
    +'<div class="vcard-body">'+tagsHtml+rowsHtml+'</div>'
    +'</div>';
}


async function vaultUnlockCard(id){
  const input = document.getElementById('unlock-input-'+id);
  if(!input) return;
  const pw = input.value;
  if(!pw){ toast('Enter password','err'); return; }
  const card = vaultData.find(c=>c.id===id);
  if(!card) return;
  const h = await vaultHash(pw);
  if(h !== card.lockHash){ toast('Wrong password','err'); input.value=''; input.focus(); return; }
  vaultUnlocked[id] = true;
  toast('Unlocked ✓');
  renderVault();
}

function vaultLockCard(id){
  delete vaultUnlocked[id];
  renderVault();
}

function vaultCopy(val){
  navigator.clipboard.writeText(val).then(()=>toast('Copied to clipboard')).catch(()=>toast('Copy failed','err'));
}

    vaultData = vaultData.filter(c=>c.id!==id);
    delete vaultUnlocked[id];
    await vaultDeleteApi(id);
    toast(`"${title}" deleted`,'warn');
    renderVault();
  });
}

function vaultEditCardModal(id){

    `<div class="mfg"><label>Card Title</label><input id="m-vetitle" value="${esc(card.title)}"/></div>
     <div class="mfg"><label>Tags</label><input id="m-vetags" value="${esc(card.tags||'')}"/></div>

       <div class="mhint">Lines starting with 🔒 stay hidden when locked. One key: value per line.</div>
     </div>
     ${card.lockHash ? `<div class="mfg"><label>Remove Lock (enter current password)</label><input type="password" id="m-veunlock" placeholder="Leave blank to keep lock"/></div>` : ''}`,
    'Save Changes','',
    async()=>{
      const title = document.getElementById('m-vetitle').value.trim();
      if(!title){ toast('Title required','err'); return; }
      card.title = title;
      card.tags  = document.getElementById('m-vetags').value.trim();
      card.rows  = vaultParseRows(document.getElementById('m-verows').value.trim());
      // Handle lock removal
      const unlockEl = document.getElementById('m-veunlock');
      if(unlockEl && unlockEl.value){
        const h = await vaultHash(unlockEl.value);
        if(h!==card.lockHash){ toast('Wrong password – lock kept','err'); }
        else { card.lockHash=''; delete vaultUnlocked[id]; toast('Lock removed'); }
      }
      await vaultSave(card);
      toast(`"${title}" saved`);
      renderVault();
    });
}

function vaultParseRows(raw){
  return raw.split('\n').map(line=>{
    const secret = line.startsWith('🔒') || line.startsWith('\uD83D\uDD12');
    const clean  = secret ? line.replace(/^🔒\s*/,'') : line;
    const colon  = clean.indexOf(':');
    if(colon < 0) return null;
    return { k: clean.slice(0,colon).trim(), v: clean.slice(colon+1).trim(), secret };
  }).filter(Boolean);
}

     <div class="mfg"><label>Email</label><input id="m-email" type="email" placeholder="user@company.com"/></div>
     <div class="mfg"><label>Temporary Password</label><input id="m-pw3" type="password" placeholder="Min 8 chars"/><div class="mhint">User changes this on first login.</div></div>
     <div class="mfg"><label>Role</label><select id="m-role3"><option>Developer</option><option>Tester</option><option>Viewer</option><option>TeamLead</option><option>Manager</option><option>Admin</option></select></div>`,
    'Create User','',
    async()=>{
      const name=document.getElementById('m-name').value.trim();
      const email=document.getElementById('m-email').value.trim();
      const pw=document.getElementById('m-pw3').value;
      const role=document.getElementById('m-role3').value;
      if(!name||!email||!pw){toast('All fields required','err');return;}
      if(pw.length<8){toast('Min 8 characters','err');return;}
      await api('POST','/workspace/add-user',{workspace_id:wsId,name,email,password:pw,role});
      toast(`${name} created`);
      viewWorkspace(wsId,'');
    });
}
</script>
</body>
</html>
